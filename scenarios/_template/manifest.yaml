# manifest.yaml — Scenario Template
# Copy this file and fill in all fields. See scenarios/README.md for full schema documentation.
# Fields marked REQUIRED must be filled before the scenario will run.
# Fields marked OPTIONAL have sensible defaults or can be omitted.

# REQUIRED: Human-readable scenario name
name: "Scenario Template"

# REQUIRED: URL-safe slug — must match the directory name exactly
slug: "_template"

# OPTIONAL: Semantic version
version: "1.0.0"

# REQUIRED: One-paragraph scenario summary (shown in scenario picker)
description: >
  Replace this with a description of the attack scenario. Describe the
  attack vector, the target systems, and the general attack path without
  revealing specific techniques to participants.

# REQUIRED: easy | medium | hard | expert
difficulty: medium

# OPTIONAL: Estimated exercise duration (informational only)
duration: "60 minutes"

# OPTIONAL: MITRE ATT&CK technique tags (for reporting / exercise tracking)
mitre:
  - technique: "TXXXX"
    name: "Replace with MITRE technique name"

# REQUIRED: Target machine name → IP mapping
# Must include all machines that phase scripts interact with via * commands
# Names must match Saffron client hostnames (listclients.bash output)
targets:
  scenario: "10.0.0.1"
  # Add target machines here, e.g.:
  # web-lin:  "10.10.10.10"
  # wks-win11: "10.30.30.20"

# OPTIONAL: Environment variables that must be non-empty after sourcing env_vars.sh
# range-scenario will check these before executing any phase and fail if any are missing
required_env:
  - COMMANDLY_SERVER
  # Add any scenario-specific required variables here

# REQUIRED: Ordered list of phases
phases:
  - slug:        "01_template"
    name:        "Template Phase"
    description: "Replace with phase description — what the attacker does in this phase"
    script:      "phases/01_template.sh"
    delay_after: 0                       # Seconds to pause after phase completes (0 = no delay)
    # OPTIONAL: Message printed to trainer terminal only (not sent to scenario container)
    trainer_note: ""

  # Add additional phases here following the same structure:
  # - slug:        "02_next_phase"
  #   name:        "Next Phase"
  #   description: "..."
  #   script:      "phases/02_next_phase.sh"
  #   delay_after: 30
