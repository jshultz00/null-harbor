# =============================================================================
# rsyslog — Syslog aggregator for the cyber range
# =============================================================================
# Receives syslog from all Linux containers and Windows agents.
# Writes to /var/log/remote/{hostname}/{date}.log for easy triage.
# =============================================================================

# ── Modules ───────────────────────────────────────────────────────────────────
module(load="imuxsock")   # local syslog socket
module(load="imudp")      # UDP syslog (Windows agents, network devices)
module(load="imtcp")      # TCP syslog (Linux containers, reliable)

# ── Listeners ────────────────────────────────────────────────────────────────
input(type="imudp" port="514")
input(type="imtcp" port="514")

# ── Global settings ───────────────────────────────────────────────────────────
global(
    workDirectory="/var/spool/rsyslog"
    maxMessageSize="32k"
)

$PreserveFQDN on
$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

# ── Remote log storage — one file per source host per date ───────────────────
template(name="RemoteHostLog"
         type="string"
         string="/var/log/remote/%HOSTNAME%/%$YEAR%-%$MONTH%-%$DAY%.log")

# Route all remote messages to per-host files
if $fromhost-ip != "127.0.0.1" then {
    action(
        type="omfile"
        dynaFile="RemoteHostLog"
        template="RSYSLOG_TraditionalFileFormat"
    )
    stop
}

# ── Local messages ────────────────────────────────────────────────────────────
*.info;mail.none;authpriv.none;cron.none  /var/log/messages
authpriv.*                                /var/log/secure
mail.*                                    -/var/log/maillog
cron.*                                    /var/log/cron
*.emerg                                   :omusrmsg:*
