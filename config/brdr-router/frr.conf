! =============================================================================
! Border Router — FRRouting configuration
! =============================================================================
! Interfaces:
!   eth0 — router_dmz  (130.2.2.0/24)  toward fw-dmz
!   eth1 — main        (17.93.8.0/29)  toward scenario (fake internet)
!
! Routing:
!   Default route → scenario (17.93.8.4) — all unknown traffic to fake internet
!   DMZ internal   → fw-dmz  (130.2.2.2)
! =============================================================================

frr version 9.1
frr defaults traditional
hostname router
log syslog informational
!
! ── Interfaces ────────────────────────────────────────────────────────────────
interface eth0
 description router_dmz — toward fw-dmz (130.2.2.2)
 ip address 130.2.2.1/24
!
interface eth1
 description main — toward scenario/fake-internet (17.93.8.4)
 ip address 17.93.8.1/29
!
interface lo
 ip address 127.0.0.1/8
!
! ── Static routes ─────────────────────────────────────────────────────────────
! Default: all traffic to the scenario engine (fake internet)
ip route 0.0.0.0/0 17.93.8.4
!
! DMZ internal segment via fw-dmz
ip route 172.16.100.0/24 130.2.2.2
!
! Internal segments via fw-dmz → fw-core (traffic goes through both firewalls)
ip route 192.168.200.0/24 130.2.2.2
ip route 192.168.100.0/24 130.2.2.2
ip route 192.168.110.0/24 130.2.2.2
ip route 192.168.66.0/24  130.2.2.2
ip route 192.168.214.0/24 130.2.2.2
!
line vty
!
