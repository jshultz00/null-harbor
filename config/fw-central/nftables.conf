#!/usr/sbin/nft -f
# =============================================================================
# fw-core — Central / Core Firewall
# =============================================================================
# Segments: Server, User, SOC, SIEM, DB (all behind this firewall).
# Default posture: PERMISSIVE with logging.
#
# Key design notes:
#   - The C2 network (172.16.0.0/24) is out-of-band and NOT routed through
#     this firewall — it bypasses segmentation by design for scenario control.
#   - This firewall handles traffic between the fw_link (DMZ side) and
#     the internal segments (Server, User, SOC, SIEM, DB).
#   - Scenario scripts tighten rules to simulate a properly segmented network.
# =============================================================================

flush ruleset

# ── Sets for quick reference ──────────────────────────────────────────────────
table inet filter {

    # Internal server segment
    set servers {
        type ipv4_addr; flags interval;
        elements = { 192.168.200.0/24 }
    }

    # User workstation segment
    set users {
        type ipv4_addr; flags interval;
        elements = { 192.168.100.0/24 }
    }

    # SOC analyst segment
    set soc {
        type ipv4_addr; flags interval;
        elements = { 192.168.110.0/24 }
    }

    # SIEM segment
    set siem {
        type ipv4_addr; flags interval;
        elements = { 192.168.66.0/24 }
    }

    # DB segment
    set db {
        type ipv4_addr; flags interval;
        elements = { 192.168.214.0/24 }
    }

    chain input {
        type filter hook input priority 0; policy accept;
        ct state new log prefix "[fw-core-in-new] " flags all
    }

    chain forward {
        type filter hook forward priority 0; policy accept;

        # Log all new forwarded connections
        ct state new log prefix "[fw-core-fwd-new] " flags all

        # ── Scenario toggle stubs ──────────────────────────────────────────
        # When a scenario requires segmentation, scripts insert rules here.
        #
        # Example — block Users from reaching DB directly (SQL injection pivot):
        #   nft add rule inet filter forward \
        #       ip saddr @users ip daddr @db drop
        #
        # Example — allow only SOC to reach Server segment on RDP (3389):
        #   nft add rule inet filter forward \
        #       ip saddr @soc ip daddr @servers tcp dport 3389 accept
        #   nft add rule inet filter forward \
        #       ip daddr @servers drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# ── NAT ───────────────────────────────────────────────────────────────────────
table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        # Internal segments going out through fw_link toward DMZ/internet
        ip saddr { 192.168.200.0/24, 192.168.100.0/24,
                   192.168.110.0/24, 192.168.66.0/24,
                   192.168.214.0/24 } masquerade
    }
}
