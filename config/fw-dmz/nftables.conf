#!/usr/sbin/nft -f
# =============================================================================
# fw-dmz — DMZ Perimeter Firewall
# =============================================================================
# Default posture: PERMISSIVE with logging.
# All traffic is allowed; connection tracking logs new flows for SIEM ingestion.
#
# Scenario scripts can add drop/reject rules by running:
#   docker exec FW-DMZ nft add rule inet filter forward <conditions> drop
# or by mounting a new nftables.conf and reloading:
#   docker exec FW-DMZ nft -f /etc/nftables.conf
# =============================================================================

flush ruleset

# ── Filter table ─────────────────────────────────────────────────────────────
table inet filter {

    chain input {
        type filter hook input priority 0; policy accept;
        # Log and accept all inbound traffic
        ct state new log prefix "[fw-dmz-in-new] " flags all
    }

    chain forward {
        type filter hook forward priority 0; policy accept;

        # Log new forwarded connections — feeds into rsyslog/Wazuh
        ct state new log prefix "[fw-dmz-fwd-new] " flags all

        # ── Scenario toggle stubs ─────────────────────────────────────────
        # Scenario scripts insert named rules here via:
        #   nft insert rule inet filter forward position 0 <rule>
        # Example: block all except HTTP/S from external to DMZ:
        #   nft add rule inet filter forward iif "eth0" oif "eth1" \
        #       ip daddr 172.16.100.0/24 tcp dport != { 80, 443 } drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# ── NAT table ─────────────────────────────────────────────────────────────────
table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        # Masquerade outbound traffic from DMZ toward the router
        oifname "eth3" masquerade
    }
}
