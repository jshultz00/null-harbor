<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn: Log In or Sign Up</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f3f2ef; }
  header { background: #fff; padding: 12px 24px; display: flex; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .logo { font-size: 28px; font-weight: 800; color: #0a66c2; margin-right: auto; }
  header nav a { color: #000; text-decoration: none; font-size: 16px; font-weight: 600; margin-left: 24px; }
  .join-btn { background: #0a66c2; color: #fff; padding: 10px 24px; border-radius: 24px; }
  .main { max-width: 960px; margin: 60px auto; padding: 0 24px; display: flex; gap: 60px; align-items: flex-start; }
  .hero h1 { font-size: 48px; font-weight: 800; color: #8f5849; line-height: 1.1; margin-bottom: 24px; max-width: 440px; }
  .form-box { background: #fff; border-radius: 8px; padding: 24px; width: 360px; box-shadow: 0 4px 12px rgba(0,0,0,.1); flex-shrink: 0; }
  .form-box h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
  .form-box input { width: 100%; padding: 14px 16px; border: 1px solid #c5cdd3; border-radius: 4px; font-size: 16px; margin-bottom: 12px; outline: none; }
  .form-box input:focus { border-color: #0a66c2; }
  .form-box button { width: 100%; padding: 14px; background: #0a66c2; color: #fff; border: none; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .form-box .divider { text-align: center; color: #666; margin: 16px 0; font-size: 14px; }
  .form-box .signup-link { text-align: center; margin-top: 20px; font-size: 14px; }
  .form-box .signup-link a { color: #0a66c2; text-decoration: none; font-weight: 600; }
  footer { text-align: center; padding: 24px; font-size: 12px; color: #666; }
  footer a { color: #666; text-decoration: none; margin: 0 8px; }
</style>
</head>
<body>
<header>
  <span class="logo">in</span>
  <nav>
    <a href="#">Sign In</a>
    <a class="join-btn" href="#">Join now</a>
  </nav>
</header>
<div class="main">
  <div class="hero">
    <h1>Welcome to your professional community</h1>
  </div>
  <div class="form-box">
    <h2>Sign in</h2>
    <input type="email" placeholder="Email or Phone">
    <input type="password" placeholder="Password">
    <button type="button">Sign in</button>
    <div class="divider">or</div>
    <div class="signup-link">New to LinkedIn? <a href="#">Join now</a></div>
  </div>
</div>
<footer>
  <a href="#">About</a>
  <a href="#">Accessibility</a>
  <a href="#">Privacy Policy</a>
  <a href="#">User Agreement</a>
  <a href="#">Cookie Policy</a>
</footer>
</body>
</html>
