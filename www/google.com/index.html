<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
  nav { display: flex; justify-content: flex-end; padding: 10px 20px; font-size: 13px; }
  nav a { margin-left: 15px; color: #202124; text-decoration: none; }
  .center { text-align: center; margin-top: 80px; }
  .logo { font-size: 72px; font-weight: bold; letter-spacing: -2px; }
  .logo span:nth-child(1) { color: #4285F4; }
  .logo span:nth-child(2) { color: #EA4335; }
  .logo span:nth-child(3) { color: #FBBC05; }
  .logo span:nth-child(4) { color: #4285F4; }
  .logo span:nth-child(5) { color: #34A853; }
  .logo span:nth-child(6) { color: #EA4335; }
  .search-box { margin: 30px auto; width: 500px; }
  .search-box input { width: 460px; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 24px; font-size: 16px; outline: none; }
  .search-box input:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
  .buttons { margin-top: 15px; }
  .buttons button { padding: 8px 16px; margin: 0 5px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; font-size: 14px; cursor: pointer; }
  .buttons button:hover { border-color: #dadce0; }
  .footer { position: fixed; bottom: 0; width: 100%; background: #f2f2f2; padding: 10px 20px; font-size: 13px; color: #70757a; }
  .footer a { color: #70757a; text-decoration: none; margin-right: 20px; }
</style>
</head>
<body>
<nav>
  <a href="#">Gmail</a>
  <a href="#">Images</a>
  <a href="#">Sign in</a>
</nav>
<div class="center">
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>
  <div class="search-box">
    <input type="text" placeholder="Search the web">
  </div>
  <div class="buttons">
    <button>Google Search</button>
    <button>I'm Feeling Lucky</button>
  </div>
</div>
<div class="footer">
  <a href="#">Advertising</a>
  <a href="#">Business</a>
  <a href="#">About</a>
  <a href="#">Privacy</a>
  <a href="#">Terms</a>
  <a href="#">Settings</a>
</div>
</body>
</html>
