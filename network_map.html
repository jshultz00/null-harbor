<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Cyber Range — Network Map</title>
<script src="network_map.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
.app { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: auto 1fr; height: 100vh; }
.legend-bar { background: #0d1117; border-bottom: 1px solid #21262d; padding: 6px 14px; display: flex; flex-wrap: wrap; gap: 6px 18px; align-items: center; flex-shrink: 0; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #8b949e; white-space: nowrap; }
.leg-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.leg-swatch.outline { background: none !important; }
.leg-divider { width: 1px; height: 14px; background: #30363d; align-self: center; }
.leg-dash { width: 20px; height: 0; border-top: 2px dashed #6e40c9; flex-shrink: 0; }
.leg-line { width: 20px; height: 0; border-top: 2px solid #58a6ff; flex-shrink: 0; }
.header { grid-column: 1/-1; background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header h1 { font-size: 1rem; font-weight: 600; color: #f0f6fc; white-space: nowrap; }
.badge { font-size: 0.68rem; padding: 2px 8px; border-radius: 12px; border: 1px solid; white-space: nowrap; }
.badge.ok   { color: #3fb950; border-color: #3fb950; }
.badge.warn { color: #d29922; border-color: #d29922; }
.badge.blue { color: #58a6ff; border-color: #58a6ff; }
.badge.red  { color: #f85149; border-color: #f85149; }
.canvas-wrap { overflow: auto; background: #0d1117; display: flex; flex-direction: column; }
svg { display: block; }
.sidebar { background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-tabs { display: flex; border-bottom: 1px solid #30363d; }
.sidebar-tabs button { flex: 1; padding: 9px 4px; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 0.76rem; border-bottom: 2px solid transparent; transition: all .15s; }
.sidebar-tabs button.active { color: #f0f6fc; border-bottom-color: #388bfd; }
.sidebar-tabs button:hover:not(.active) { color: #c9d1d9; }
.tab-panel { display: none; padding: 12px; flex: 1; overflow-y: auto; }
.tab-panel.active { display: block; }
.card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 11px; margin-bottom: 10px; }
.card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; color: #8b949e; margin-bottom: 7px; }
.card p  { font-size: 0.8rem; color: #c9d1d9; line-height: 1.5; }
.issue { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; font-size: 0.78rem; line-height: 1.4; color: #c9d1d9; }
.issue .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.dot.red    { background: #f85149; }
.dot.yellow { background: #d29922; }
.dot.green  { background: #3fb950; }
.dot.blue   { background: #388bfd; }
.dot.purple { background: #bc8cff; }
.profile-btn { display: inline-block; padding: 4px 10px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; font-size: 0.75rem; cursor: pointer; margin: 2px; transition: all .15s; }
.profile-btn:hover { border-color: #388bfd; color: #58a6ff; }
.profile-btn.active { background: #1c3555; border-color: #388bfd; color: #58a6ff; }
#detail h2 { font-size: 0.92rem; color: #f0f6fc; margin-bottom: 2px; }
#detail .os { font-size: 0.76rem; color: #8b949e; margin-bottom: 10px; }
.detail-row { display: flex; gap: 6px; margin-bottom: 3px; font-size: 0.76rem; }
.detail-label { color: #8b949e; min-width: 74px; }
.detail-val   { color: #c9d1d9; }
.iface-item   { background: #0d1117; border-radius: 4px; padding: 4px 8px; margin-bottom: 3px; font-size: 0.73rem; color: #8b949e; }
.iface-item span { color: #58a6ff; }
.deploy-box { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; margin-top: 8px; }
.deploy-box .dkey { font-size: 0.7rem; color: #8b949e; margin-bottom: 1px; }
.deploy-box .dval { font-size: 0.76rem; color: #79c0ff; font-family: monospace; word-break: break-all; }
.deploy-box .dnote { font-size: 0.73rem; color: #d29922; margin-top: 6px; line-height: 1.4; }
.res-bar { background: #21262d; border-radius: 4px; height: 7px; overflow: hidden; margin-top: 3px; }
.res-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.res-fill.green  { background: #3fb950; }
.res-fill.yellow { background: #d29922; }
.res-fill.red    { background: #f85149; }
.type-pill { display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
.type-pill.linux   { background: #1a3a2a; color: #3fb950; border: 1px solid #3fb950; }
.type-pill.windows { background: #1a2a3a; color: #58a6ff; border: 1px solid #58a6ff; }
.type-pill.macos   { background: #2a1a3a; color: #bf91e8; border: 1px solid #bf91e8; }
.type-pill.fw      { background: #3a2a1a; color: #d29922; border: 1px solid #d29922; }
.node-group { cursor: pointer; }
.node-group:hover .node-rect { filter: brightness(1.4); }
.node-group.selected .node-rect { stroke-width: 2.5 !important; stroke: #f0f6fc !important; }
.node-label { font-family: 'Segoe UI', sans-serif; font-size: 8.5px; fill: #e6edf3; pointer-events: none; font-weight: 500; }
.node-sub   { font-family: 'Segoe UI', sans-serif; font-size: 7.5px; fill: #8b949e; pointer-events: none; }
.zone-label { font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; opacity: .4; pointer-events: none; }
.edge { stroke-width: 1.2; fill: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header" id="app-header">
    <h1>Local Cyber Range</h1>
    <span class="badge blue" id="hdr-deploy"></span>
    <span class="badge ok"   id="hdr-nodes"></span>
    <span style="margin-left:auto; font-size:.72rem; color:#8b949e">Click node for details</span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="legend-bar">
      <div class="leg-item"><div class="leg-swatch" style="background:#1e6e3a"></div>Linux</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#1e4e96"></div>Windows</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#8c4e14"></div>Firewall/Router</div>
      <div class="leg-divider"></div>
      <div class="leg-item"><div class="leg-swatch" style="background:#0a1830"></div>DMZ</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#081c0e"></div>Server</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#0c0a24"></div>SOC</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#1a1206"></div>Users</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#080e1e"></div>SIEM</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#1c060e"></div>Database</div>
      <div class="leg-divider"></div>
      <div class="leg-item"><div class="leg-line"></div>Transit path</div>
      <div class="leg-item"><div style="width:20px;height:0;border-top:2px solid #4a5568;flex-shrink:0"></div>Segment link</div>
    </div>
    <svg id="diagram"></svg>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <button data-tab="resources" class="active">Resources</button>
      <button data-tab="node">Node</button>
    </div>

    <!-- Resources tab -->
    <div class="tab-panel active" id="tab-resources">
      <div class="card">
        <h3>RAM Budget</h3>
        <div id="ram-budget-summary" style="display:flex;gap:16px;margin-bottom:10px;font-size:.75rem"></div>
        <div id="ram-bars"></div>
      </div>
      <div class="card">
        <h3>By Type</h3>
        <div id="type-breakdown"></div>
      </div>
    </div>

    <!-- Node detail tab -->
    <div class="tab-panel" id="tab-node">
      <div id="detail-placeholder" style="color:#8b949e;font-size:.8rem;padding:20px 14px">Click any node on the diagram to see its details here.</div>
      <div id="detail" style="display:none;padding:14px"></div>
    </div>
  </div>
</div>

<script>
// ─── Layout — derived from network_map.js ────────────────────────────────────
// To add a zone: add an entry to NETWORK_MAP_DATA.layout.zones in network_map.js.
// To change colors or dimensions: edit NETWORK_MAP_DATA.layout in network_map.js.
const _L = NETWORK_MAP_DATA.layout;
const _C = _L.chain;

const CHAIN_Y       = _C.y;
const CHAIN_START_X = _C.startX;
const CHAIN_NODE_W  = _C.nodeW;
const CHAIN_NODE_H  = _C.nodeH;
const CHAIN_GAP     = _C.gap;
const ZONE_PAD      = _C.zonePad;
const ZONE_LABEL_H  = _C.zoneLabelH;
const NODE_GAP      = _C.nodeGap;

const ZONE_CONFIG = _L.zones.map(zc => ({
  id: zc.id, label: zc.label, color: zc.bgColor,
  x: zc.x, y: zc.y, cols: zc.cols, nodeW: zc.nodeW, nodeH: zc.nodeH,
}));

const SEGMENT_TO_ZONE = Object.fromEntries(
  _L.zones.map(zc => [zc.segment, { zoneId: zc.id, side: zc.connectorSide }])
);

const COLOR_LINUX         = _L.colors.nodeType.linux;
const COLOR_WINDOWS       = _L.colors.nodeType.windows;
const COLOR_MACOS         = _L.colors.nodeType.macos;
const COLOR_FW            = _L.colors.nodeType.fw;
const COLOR_ATTACK_ZONE   = _L.colors.attackZone;
const TYPE_BORDER         = _L.colors.typeBorder;

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs, text) {
  const el = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

// ─── Classification helpers ───────────────────────────────────────────────────
function classifyType(m) {
  const t = (m.deploy && m.deploy.type) || '';
  if (t === 'linux-firewall' || t === 'linux-router') return 'fw';
  if (t === 'windows-container') return 'windows';
  if (t === 'macos-container') return 'macos';
  return 'linux';
}

function getChainRole(id, m) {
  const t = (m.deploy && m.deploy.type) || '';
  const nets = (m.interfaces || []).map(i => i.network);
  if (t === 'linux-router') return 'router';
  if (t === 'linux-firewall') {
    if (nets.includes('DMZ_Internal')) return 'fw-dmz';
    if (nets.includes('Server')) return 'fw-central';
  }
  if (nets.includes('Scenario') || nets.includes('External')) return 'attack';
  return null;
}

function getZoneId(m) {
  const nets = new Set((m.interfaces || []).map(i => i.network));
  for (const zc of _L.zones) {
    if (nets.has(zc.segment)) return zc.id;
  }
  return null;
}

function expandProfile(profileName, profiles, allIds, visited) {
  if (!visited) visited = new Set();
  if (visited.has(profileName)) return new Set();
  visited.add(profileName);
  if (profileName === 'all') return new Set(allIds);
  const prof = profiles[profileName];
  if (!prof) return new Set(allIds);
  const result = new Set();
  for (const svc of prof.services) {
    if (svc === 'all') {
      allIds.forEach(id => result.add(id));
    } else if (profiles[svc]) {
      const sub = expandProfile(svc, profiles, allIds, visited);
      sub.forEach(id => result.add(id));
    } else {
      result.add(svc);
    }
  }
  return result;
}

function shortName(id) {
  let s = id.replace(/^HN-/, '');
  s = s.replace('BRDR-Router', 'BRDR-Rtr');
  s = s.replace('DMZ-Mail-Relay', 'DMZ-Mail');
  return s;
}

function ramStr(ram) {
  const v = parseFloat(ram);
  if (v < 1) return '256 MB';
  return v + ' GB';
}

// ─── Layout computation ───────────────────────────────────────────────────────
function computeLayout() {
  const machines = NETWORK_MAP_DATA.machines;
  const allIds = Object.keys(machines);

  // Classify each node
  const classified = {};
  allIds.forEach(id => {
    const m = machines[id];
    classified[id] = {
      id,
      m,
      type: classifyType(m),
      chainRole: getChainRole(id, m),
      zoneId: getZoneId(m),
    };
  });

  // Build chain: attack -> router -> fw-dmz -> fw-central
  const chainOrder = ['attack', 'router', 'fw-dmz', 'fw-central'];
  const chainNodes = [];
  chainOrder.forEach(role => {
    const found = allIds.filter(id => classified[id].chainRole === role);
    found.forEach(id => chainNodes.push(id));
  });

  // Compute chain positions
  const layoutNodes = {};
  chainNodes.forEach((id, i) => {
    const x = CHAIN_START_X + i * (CHAIN_NODE_W + CHAIN_GAP);
    const y = CHAIN_Y - CHAIN_NODE_H / 2;
    layoutNodes[id] = { x, y, w: CHAIN_NODE_W, h: CHAIN_NODE_H, chain: true };
  });

  // Attack zone background — only covers attack-role nodes, not router/firewall
  const attackCount = chainNodes.filter(id => classified[id].chainRole === 'attack').length;
  const attackZone = {
    x: CHAIN_START_X - ZONE_PAD,
    y: CHAIN_Y - CHAIN_NODE_H / 2 - ZONE_LABEL_H - ZONE_PAD,
    w: attackCount * (CHAIN_NODE_W + CHAIN_GAP) - CHAIN_GAP + ZONE_PAD * 2,
    h: CHAIN_NODE_H + ZONE_LABEL_H + 2 * ZONE_PAD,
  };

  // Zone layout
  const zoneBounds = {};
  ZONE_CONFIG.forEach(zc => {
    const zoneIds = allIds.filter(id => classified[id].zoneId === zc.id && !layoutNodes[id]);
    if (zoneIds.length === 0) return;

    zoneIds.forEach((id, i) => {
      const col = i % zc.cols;
      const row = Math.floor(i / zc.cols);
      const x = zc.x + ZONE_PAD + col * (zc.nodeW + NODE_GAP);
      const y = zc.y + ZONE_LABEL_H + ZONE_PAD + row * (zc.nodeH + NODE_GAP);
      layoutNodes[id] = { x, y, w: zc.nodeW, h: zc.nodeH, chain: false };
    });

    const cols = Math.min(zoneIds.length, zc.cols);
    const rows = Math.ceil(zoneIds.length / zc.cols);
    zoneBounds[zc.id] = {
      x: zc.x,
      y: zc.y,
      w: ZONE_PAD * 2 + cols * zc.nodeW + (cols - 1) * NODE_GAP,
      h: ZONE_PAD * 2 + rows * zc.nodeH + (rows - 1) * NODE_GAP + ZONE_LABEL_H + 4,
      label: zc.label,
      color: zc.color,
    };
  });

  // Build chain edges (between consecutive chain nodes)
  const chainEdges = [];
  for (let i = 0; i < chainNodes.length - 1; i++) {
    chainEdges.push({ from: chainNodes[i], to: chainNodes[i + 1] });
  }

  // Build zone edges: fw-central -> each internal zone, fw-dmz -> DMZ
  const zoneEdges = [];
  const fwCentral = allIds.find(id => classified[id].chainRole === 'fw-central');
  const fwDmz = allIds.find(id => classified[id].chainRole === 'fw-dmz');

  if (fwCentral && layoutNodes[fwCentral]) {
    ['Server', 'SOC', 'User', 'SIEM', 'DB'].forEach(zoneId => {
      if (zoneBounds[zoneId]) {
        zoneEdges.push({ from: fwCentral, toZone: zoneId });
      }
    });
  }
  if (fwDmz && layoutNodes[fwDmz]) {
    if (zoneBounds['DMZ']) {
      zoneEdges.push({ from: fwDmz, toZone: 'DMZ' });
    }
  }

  // Compute viewBox
  let maxX = 0, maxY = 0;
  Object.values(layoutNodes).forEach(n => {
    maxX = Math.max(maxX, n.x + n.w);
    maxY = Math.max(maxY, n.y + n.h);
  });
  Object.values(zoneBounds).forEach(z => {
    maxX = Math.max(maxX, z.x + z.w);
    maxY = Math.max(maxY, z.y + z.h);
  });
  const viewBox = `0 0 ${maxX + 24} ${maxY + 24}`;

  return { layoutNodes, zoneBounds, attackZone, chainEdges, zoneEdges, viewBox, classified, chainNodes };
}

// ─── Node color helpers ───────────────────────────────────────────────────────
function getNodeFill(id, classified) {
  const { type } = classified[id];
  if (type === 'windows') return COLOR_WINDOWS;
  if (type === 'macos')   return COLOR_MACOS;
  if (type === 'fw')      return COLOR_FW;
  return COLOR_LINUX;
}

// ─── Diagram rendering ────────────────────────────────────────────────────────
function renderDiagram(layout) {
  const { layoutNodes, zoneBounds, attackZone, chainEdges, zoneEdges, viewBox, classified } = layout;
  const svg = document.getElementById('diagram');
  svg.setAttribute('viewBox', viewBox);
  svg.setAttribute('width', '100%');
  const parts = viewBox.split(' ');
  svg.setAttribute('height', parts[3]);
  svg.innerHTML = '';

  // Arrowhead markers
  const defs = svgEl('defs');
  const mkArrow = (id, color) => {
    const marker = svgEl('marker', { id, markerWidth:'8', markerHeight:'6', refX:'7', refY:'3', orient:'auto' });
    const poly = svgEl('polygon', { points:'0 0, 8 3, 0 6', fill: color });
    marker.appendChild(poly);
    return marker;
  };
  defs.appendChild(mkArrow('arr-gray', '#4a5568'));
  defs.appendChild(mkArrow('arr-blue', '#58a6ff'));
  svg.appendChild(defs);

  // Attack zone background
  const atZone = svgEl('rect', {
    x: attackZone.x, y: attackZone.y,
    width: attackZone.w, height: attackZone.h,
    fill: COLOR_ATTACK_ZONE.bgColor, rx: '6',
    stroke: COLOR_ATTACK_ZONE.strokeColor, 'stroke-width': '1',
  });
  svg.appendChild(atZone);
  const atLabel = svgEl('text', {
    x: attackZone.x + 8,
    y: attackZone.y + 12,
    class: 'zone-label', fill: COLOR_ATTACK_ZONE.labelColor,
  }, 'SCENARIO');
  svg.appendChild(atLabel);

  // Zone backgrounds
  Object.entries(zoneBounds).forEach(([zoneId, zb]) => {
    const rect = svgEl('rect', {
      x: zb.x, y: zb.y, width: zb.w, height: zb.h,
      fill: zb.color, rx: '6',
      stroke: '#30363d', 'stroke-width': '1',
    });
    svg.appendChild(rect);
    const lbl = svgEl('text', {
      x: zb.x + 8, y: zb.y + 13,
      class: 'zone-label', fill: '#8b949e',
    }, zb.label);
    svg.appendChild(lbl);
  });

  // Chain edges (blue transit)
  chainEdges.forEach(({ from, to }) => {
    const fn = layoutNodes[from];
    const tn = layoutNodes[to];
    if (!fn || !tn) return;
    const x1 = fn.x + fn.w;
    const y1 = fn.y + fn.h / 2;
    const x2 = tn.x;
    const y2 = tn.y + tn.h / 2;
    const edge = svgEl('line', {
      x1, y1, x2, y2,
      stroke: '#58a6ff', 'stroke-width': '2',
      'marker-end': 'url(#arr-blue)',
    });
    svg.appendChild(edge);
  });

  // Zone edges (gray segment links)
  zoneEdges.forEach(({ from, toZone }) => {
    const fn = layoutNodes[from];
    const zb = zoneBounds[toZone];
    if (!fn || !zb) return;
    const segKey = toZone === 'DMZ' ? 'DMZ_Internal' : toZone;
    const zCfg = SEGMENT_TO_ZONE[segKey];
    const side = zCfg ? zCfg.side : 'top';

    const fx = fn.x + fn.w / 2;
    const fy = fn.y + fn.h / 2;
    let tx, ty;
    if (side === 'top')    { tx = zb.x + zb.w / 2; ty = zb.y; }
    else if (side === 'bottom') { tx = zb.x + zb.w / 2; ty = zb.y + zb.h; }
    else if (side === 'left')   { tx = zb.x; ty = zb.y + zb.h / 2; }
    else                        { tx = zb.x + zb.w; ty = zb.y + zb.h / 2; }

    const edge = svgEl('line', {
      x1: fx, y1: fy, x2: tx, y2: ty,
      stroke: '#4a5568', 'stroke-width': '1.8',
      'stroke-dasharray': '4 3',
      'marker-end': 'url(#arr-gray)',
    });
    svg.appendChild(edge);
  });

  // Nodes
  Object.entries(layoutNodes).forEach(([id, pos]) => {
    const info = classified[id];
    const fill = getNodeFill(id, classified);
    const border = TYPE_BORDER[info.type];
    const m = info.m;

    const g = svgEl('g', { class: 'node-group', 'data-id': id });

    const rect = svgEl('rect', {
      class: 'node-rect',
      x: pos.x, y: pos.y, width: pos.w, height: pos.h,
      fill, rx: '4',
      stroke: border, 'stroke-width': '1.5',
    });
    g.appendChild(rect);

    const name = shortName(id);
    const label = svgEl('text', {
      class: 'node-label',
      x: pos.x + pos.w / 2,
      y: pos.y + pos.h / 2 - 4,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
    }, name);
    g.appendChild(label);

    const ram = parseFloat(m['Memory (GB)']);
    const ramLabel = ram < 1 ? '256 MB' : ram + ' GB';
    const sub = svgEl('text', {
      class: 'node-sub',
      x: pos.x + pos.w / 2,
      y: pos.y + pos.h / 2 + 8,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
    }, ramLabel);
    g.appendChild(sub);

    g.addEventListener('click', () => selectNode(id));
    svg.appendChild(g);
  });
}

// ─── Header ───────────────────────────────────────────────────────────────────
function updateHeader() {
  const meta = NETWORK_MAP_DATA._meta;
  const allIds = Object.keys(NETWORK_MAP_DATA.machines);
  document.getElementById('hdr-deploy').textContent = meta.deployment || 'docker-compose';
  document.getElementById('hdr-nodes').textContent = allIds.length + ' nodes';
}

// ─── Node detail ──────────────────────────────────────────────────────────────
let selectedId = null;

function selectNode(id) {
  if (selectedId) {
    const prev = document.querySelector('.node-group[data-id="' + selectedId + '"]');
    if (prev) prev.classList.remove('selected');
  }
  selectedId = id;
  const g = document.querySelector('.node-group[data-id="' + id + '"]');
  if (g) g.classList.add('selected');

  const m = NETWORK_MAP_DATA.machines[id];
  if (!m) return;

  const t = classifyType(m);
  const d = m.deploy || {};
  document.getElementById('detail-placeholder').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'block';

  let html = '<h2>' + id + '<span class="type-pill ' + t + '">' + t + '</span></h2>';
  html += '<div class="os">' + (m.OS || '') + '</div>';
  html += '<div class="detail-row"><span class="detail-label">RAM</span><span class="detail-val">' + m['Memory (GB)'] + ' GB</span></div>';
  html += '<div class="detail-row"><span class="detail-label">CPUs</span><span class="detail-val">' + m.CPUs + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Disk</span><span class="detail-val">' + m['HDD Size (GB)'] + ' GB</span></div>';
  if (d.image) {
    html += '<div class="detail-row"><span class="detail-label">Image</span><span class="detail-val" style="font-family:monospace;font-size:.72rem;color:#79c0ff">' + d.image + '</span></div>';
  }
  if (d.mem_limit) {
    html += '<div class="detail-row"><span class="detail-label">mem_limit</span><span class="detail-val" style="font-family:monospace">' + d.mem_limit + '</span></div>';
  }
  if (d.requires_kvm) {
    html += '<div class="detail-row"><span class="detail-label">KVM</span><span class="detail-val" style="color:#d29922">required</span></div>';
  }
  if (m.description) {
    html += '<p style="font-size:.75rem;color:#8b949e;margin-top:8px;line-height:1.5">' + m.description + '</p>';
  }
  if (m.interfaces && m.interfaces.length) {
    html += '<div style="margin-top:10px;font-size:.72rem;color:#8b949e;margin-bottom:4px">INTERFACES</div>';
    m.interfaces.forEach(iface => {
      html += '<div class="iface-item">' + iface.network + ' \u2014 <span>' + iface.ip + '</span></div>';
    });
  }
  if (d.notes) {
    html += '<div class="deploy-box"><div class="dkey">Notes</div><div class="dnote">' + d.notes + '</div></div>';
  }

  detail.innerHTML = html;
  switchTab('node');
}

// ─── Resources / RAM bars ─────────────────────────────────────────────────────
function buildBars() {
  const machines = NETWORK_MAP_DATA.machines;
  const allIds = Object.keys(machines);
  const profiles = NETWORK_MAP_DATA.profiles;

  // Compute totals
  let totalRam = 0;
  allIds.forEach(id => { totalRam += parseFloat(machines[id]['Memory (GB)']) || 0; });

  // RAM budget summary
  document.getElementById('ram-budget-summary').innerHTML =
    '<div style="text-align:center"><div style="color:#79c0ff;font-size:1rem;font-weight:600">~' + Math.round(totalRam) + ' GB</div><div style="color:#8b949e">full range</div></div>';

  // Per-node RAM bars
  const sorted = allIds.slice().sort((a, b) => parseFloat(machines[b]['Memory (GB)']) - parseFloat(machines[a]['Memory (GB)']));
  const maxRam = Math.max.apply(null, sorted.map(id => parseFloat(machines[id]['Memory (GB)'])));
  let barsHtml = '';
  sorted.forEach(id => {
    const ram = parseFloat(machines[id]['Memory (GB)']);
    const pct = Math.round((ram / maxRam) * 100);
    const cls = ram >= 6 ? 'red' : ram >= 3 ? 'yellow' : 'green';
    const t = classifyType(machines[id]);
    const label = ram < 1 ? '256 MB' : ram + ' GB';
    barsHtml +=
      '<div style="margin-bottom:7px">' +
        '<div style="display:flex;justify-content:space-between;font-size:.72rem;color:#8b949e;margin-bottom:2px">' +
          '<span>' + shortName(id) + '<span class="type-pill ' + t + '">' + t + '</span></span>' +
          '<span style="color:#c9d1d9">' + label + '</span>' +
        '</div>' +
        '<div class="res-bar"><div class="res-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
      '</div>';
  });
  document.getElementById('ram-bars').innerHTML = barsHtml;

  // By type breakdown
  const typeCount = { linux: 0, windows: 0, macos: 0, fw: 0 };
  const typeRam   = { linux: 0, windows: 0, macos: 0, fw: 0 };
  allIds.forEach(id => {
    const t = classifyType(machines[id]);
    typeCount[t]++;
    typeRam[t] += parseFloat(machines[id]['Memory (GB)']) || 0;
  });
  let bdHtml = '';
  Object.entries(typeCount).forEach(([type, cnt]) => {
    const tr = typeRam[type];
    const trLabel = tr < 1 ? '256 MB' : tr + ' GB';
    bdHtml +=
      '<div style="display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:5px">' +
        '<span><span class="type-pill ' + type + '">' + type + '</span> \u00d7' + cnt + '</span>' +
        '<span style="color:#c9d1d9">' + trLabel + ' total</span>' +
      '</div>';
  });
  document.getElementById('type-breakdown').innerHTML = bdHtml;
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  if (btn) {
    btn.classList.add('active');
  } else {
    const matchBtn = document.querySelector('.sidebar-tabs button[data-tab="' + name + '"]');
    if (matchBtn) matchBtn.classList.add('active');
  }
}

// Wire up tab buttons
document.querySelectorAll('.sidebar-tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab, btn));
});

// ─── Init ─────────────────────────────────────────────────────────────────────
const layout = computeLayout();
renderDiagram(layout);
updateHeader();
buildBars();
</script>
