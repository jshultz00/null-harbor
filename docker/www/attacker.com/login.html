<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f5; }
  .card { max-width: 380px; margin: 100px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.12); padding: 40px; }
  .card h1 { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .card .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }
  .card label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
  .card input { width: 100%; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; margin-bottom: 16px; outline: none; }
  .card input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
  .card button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .card .forgot { text-align: center; margin-top: 14px; font-size: 13px; }
  .card .forgot a { color: #2563eb; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Sign in to your account</h1>
  <p class="subtitle">Enter your credentials below</p>
  <label for="email">Email address</label>
  <input id="email" type="email" placeholder="you@example.com" autocomplete="username">
  <label for="password">Password</label>
  <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
  <button type="button">Sign In</button>
  <div class="forgot"><a href="#">Forgot password?</a></div>
</div>
</body>
</html>
