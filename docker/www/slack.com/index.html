<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Lato", Arial, sans-serif; color: #1d1c1d; background: #fff; }
  header { padding: 16px 40px; display: flex; align-items: center; box-shadow: 0 1px 0 rgba(0,0,0,.1); }
  .logo { font-size: 26px; font-weight: 900; color: #611f69; margin-right: auto; }
  header nav a { text-decoration: none; color: #1d1c1d; font-size: 15px; margin-left: 24px; font-weight: 700; }
  .try-btn { background: #611f69; color: #fff; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-size: 15px; font-weight: 700; margin-left: 24px; }
  .sign-in-form { max-width: 400px; margin: 80px auto; padding: 40px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
  .sign-in-form h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .sign-in-form p { text-align: center; color: #616061; font-size: 15px; margin-bottom: 28px; }
  .sign-in-form label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .sign-in-form input { width: 100%; padding: 12px 14px; border: 1px solid #868686; border-radius: 4px; font-size: 16px; margin-bottom: 16px; outline: none; }
  .sign-in-form input:focus { border-color: #611f69; box-shadow: 0 0 0 1px #611f69; }
  .sign-in-form button { width: 100%; padding: 14px; background: #611f69; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: 700; cursor: pointer; }
  footer { text-align: center; padding: 40px; font-size: 13px; color: #868686; }
  footer a { color: #1264a3; text-decoration: none; margin: 0 8px; }
</style>
</head>
<body>
<header>
  <span class="logo">Slack</span>
  <nav>
    <a href="#">Product</a>
    <a href="#">Enterprise</a>
    <a href="#">Pricing</a>
  </nav>
  <a class="try-btn" href="#">Try for free</a>
</header>
<div class="sign-in-form">
  <h1>Sign in to your workspace</h1>
  <p>Enter your workspace's Slack URL to continue.</p>
  <label for="workspace">Workspace URL</label>
  <input id="workspace" type="text" placeholder="your-workspace.slack.com">
  <button type="button">Continue</button>
</div>
<footer>
  <a href="#">Privacy Policy</a>
  <a href="#">Terms of Service</a>
  <a href="#">Cookie Preferences</a>
  &copy; 2024 Slack Technologies, LLC
</footer>
</body>
</html>
