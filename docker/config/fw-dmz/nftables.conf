#!/usr/sbin/nft -f

flush ruleset

# DMZ host groups — update these sets when DMZ services are added or their IPs change
define DMZ_WEBSERVERS = { 10.10.10.10, 10.10.10.12 }
define DMZ_HOSTS      = { 10.10.10.10, 10.10.10.12, 10.10.10.20 }

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;
        ct state invalid drop
        ct state established,related accept
        # Management interface — silently accept all inbound (OOB management plane)
        iifname "eth0" accept
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }

    # Forward chain is PERMISSIVE by design.
    # Security control is SIEM logging, not blocking. Defenders must detect attacks via
    # Wazuh and respond — fw-dmz does not block for them.
    chain forward {
        type filter hook forward priority 0; policy accept;
        ct state invalid drop
        # ---- Management traffic: accept BEFORE log ----
        # INVARIANT: These two rules must always appear above the log statement.
        # If moved below, 10.0.0.x traffic will appear in FW-DMZ-FWD log lines and
        # leak the OOB management plane to participants via Wazuh. Hard design violation.
        iifname "eth0" accept
        ip daddr 10.0.0.0/24 accept
        # ---- Log all remaining forwarded traffic for Wazuh analysis ----
        log prefix "FW-DMZ-FWD: " flags all
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {

    # Dynamic SNAT chain — empty at startup.
    # Scenario phases inject and flush rules here via Saffron to vary the apparent
    # attacker source IP between phases. Example injection:
    #   nft add rule ip nat SCENARIO_SNAT ip saddr 5.79.99.1 oifname "eth2" snat to 185.220.101.47
    # Flush between exercises:
    #   nft flush chain ip nat SCENARIO_SNAT
    chain SCENARIO_SNAT {
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        # Scenario-injected SNAT rules evaluated first (per-phase attacker IP diversity)
        jump SCENARIO_SNAT
        # Default masquerade for traffic exiting toward the DMZ.
        # Applies only if SCENARIO_SNAT did not match (chain fell through).
        oifname "eth2" masquerade
    }

    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        # Static DNAT rules for DMZ hosts — always-on regardless of active scenario.
        # Add a rule here for every service reachable from the fake internet.

        # web-lin (Ubuntu / Apache + PHP): employee web portal
        iifname "eth1" ip daddr 5.79.99.10 tcp dport { 80, 443 } dnat to 10.10.10.10

        # web-win (Windows Server / IIS): Windows DMZ web target
        iifname "eth1" ip daddr 5.79.99.12 tcp dport { 80, 443 } dnat to 10.10.10.12

        # mail-relay (Postfix): inbound SMTP from fake internet -> Exchange relay
        iifname "eth1" ip daddr 5.79.99.25 tcp dport 25 dnat to 10.10.10.20
    }
}
