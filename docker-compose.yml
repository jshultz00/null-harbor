# =============================================================================
# Local Cyber Range — Docker Compose
# =============================================================================
# Prerequisites:
#   1. Run 'make build' once before first 'make up' (builds images + Wazuh certs)
#   2. Linux host with KVM enabled for Windows/macOS VMs
#
# Usage:
#   make up                     # core profile (~20 GB RAM)
#   make up PROFILE=web-attack  # adds DMZ + DB (~28 GB RAM)
#   make up PROFILE=full        # everything (~64 GB RAM)
#   make down                   # stop, preserve Windows disk volumes
#   make reset                  # full teardown including disk volumes
#
# Service names match the machine IDs in network_map.js.
# All secrets are in .env — see .env.example for reference.
# =============================================================================

name: cyber-range

# ---------------------------------------------------------------------------
# Networks — one per segment in network_map.js
# ---------------------------------------------------------------------------
networks:
  main:
    driver: bridge
    ipam:
      config: [{subnet: "17.93.8.0/29"}]

  router_dmz:
    driver: bridge
    ipam:
      config: [{subnet: "130.2.2.0/24"}]

  fw_link:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.254.0/30"}]

  dmz_internal:
    driver: bridge
    ipam:
      config: [{subnet: "172.16.100.0/24"}]

  # Out-of-band control plane — connects scenario engine to every host.
  # Wazuh manager also lives here so all agents can reach it without routing.
  c2:
    driver: bridge
    ipam:
      config: [{subnet: "172.16.0.0/24"}]

  management:
    driver: bridge
    ipam:
      config: [{subnet: "172.31.202.0/24"}]

  server:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.200.0/24"}]

  user:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.100.0/24"}]

  soc_net:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.110.0/24"}]

  siem:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.66.0/24"}]

  db:
    driver: bridge
    ipam:
      config: [{subnet: "192.168.214.0/24"}]

  scenario:
    driver: bridge
    ipam:
      config: [{subnet: "9.53.99.0/24"}]

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── Attacker / Scenario Engine / Fake Internet ────────────────────────────
  scenario:
    container_name: SCENARIO
    build: ./dockerfiles/scenario
    image: cyber-range/scenario:local
    profiles: [core, web-attack, full]
    hostname: scenario
    cap_add: [NET_ADMIN, NET_RAW]
    mem_limit: 6g
    cpus: 4
    networks:
      scenario:
        ipv4_address: "9.53.99.47"
      main:
        ipv4_address: "17.93.8.4"
      c2:
        ipv4_address: "172.16.0.1"
    volumes:
      - ./scenarios:/home/trainer/scenarios
      - ./www:/var/www/html
    environment:
      - RANGE_PASSWORD=${RANGE_PASSWORD}
      - WAZUH_MANAGER=${WAZUH_MANAGER}
      - WAZUH_ENROLLMENT_PSK=${WAZUH_ENROLLMENT_PSK}
      - WAZUH_AGENT_NAME=scenario
    ports:
      - "2222:22"   # SSH — trainer/developer access to the Kali scenario container
    restart: unless-stopped

  # ── Routing & Firewalls ────────────────────────────────────────────────────
  router:
    container_name: ROUTER
    image: frrouting/frr:latest
    profiles: [web-attack, full]
    hostname: router
    cap_add: [NET_ADMIN, NET_RAW, SYS_ADMIN]
    mem_limit: 256m
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
    networks:
      router_dmz:
        ipv4_address: "130.2.2.1"
      main:
        ipv4_address: "17.93.8.1"
    volumes:
      - ./config/brdr-router/frr.conf:/etc/frr/frr.conf:ro
      - ./config/brdr-router/daemons:/etc/frr/daemons:ro
    restart: unless-stopped

  fw-dmz:
    container_name: FW-DMZ
    build: ./dockerfiles/fw
    image: cyber-range/fw:local
    profiles: [core, web-attack, full]
    hostname: fw-dmz
    cap_add: [NET_ADMIN, NET_RAW]
    mem_limit: 256m
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      management:
        ipv4_address: "172.31.202.140"
      fw_link:
        ipv4_address: "192.168.254.242"
      dmz_internal:
        ipv4_address: "172.16.100.254"
      router_dmz:
        ipv4_address: "130.2.2.2"
    volumes:
      - ./config/fw-dmz/nftables.conf:/etc/nftables.conf:ro
    environment:
      - RANGE_PASSWORD=${RANGE_PASSWORD}
      - WAZUH_MANAGER=${WAZUH_MANAGER}
      - WAZUH_ENROLLMENT_PSK=${WAZUH_ENROLLMENT_PSK}
      - WAZUH_AGENT_NAME=fw-dmz
    restart: unless-stopped

  fw-core:
    container_name: FW-CORE
    build: ./dockerfiles/fw
    image: cyber-range/fw:local
    profiles: [core, web-attack, full]
    hostname: fw-core
    cap_add: [NET_ADMIN, NET_RAW]
    mem_limit: 256m
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      management:
        ipv4_address: "172.31.202.139"
      fw_link:
        ipv4_address: "192.168.254.241"
      server:
        ipv4_address: "192.168.200.254"
      user:
        ipv4_address: "192.168.100.254"
      soc_net:
        ipv4_address: "192.168.110.254"
      siem:
        ipv4_address: "192.168.66.254"
      db:
        ipv4_address: "192.168.214.254"
    volumes:
      - ./config/fw-central/nftables.conf:/etc/nftables.conf:ro
    environment:
      - RANGE_PASSWORD=${RANGE_PASSWORD}
      - WAZUH_MANAGER=${WAZUH_MANAGER}
      - WAZUH_ENROLLMENT_PSK=${WAZUH_ENROLLMENT_PSK}
      - WAZUH_AGENT_NAME=fw-core
    restart: unless-stopped

  # ── DMZ Linux Web Servers ─────────────────────────────────────────────────
  web-lin:
    container_name: WEB-LIN
    build: ./dockerfiles/web-lin
    image: cyber-range/web-lin:local
    profiles: [web-attack, full]
    hostname: web-lin
    mem_limit: 512m
    cpus: 1
    networks:
      c2:
        ipv4_address: "172.16.0.40"
      dmz_internal:
        ipv4_address: "172.16.100.10"
      router_dmz:
        ipv4_address: "130.2.2.4"
    volumes:
      - ./webapps/web01:/var/www/html:ro
    environment:
      - RANGE_PASSWORD=${RANGE_PASSWORD}
      - WAZUH_MANAGER=${WAZUH_MANAGER}
      - WAZUH_ENROLLMENT_PSK=${WAZUH_ENROLLMENT_PSK}
      - WAZUH_AGENT_NAME=web-lin
    restart: unless-stopped

  # ── DMZ Windows Web Server (dockur/windows — standalone, no domain join) ──
  web-win:
    container_name: WEB-WIN
    image: ghcr.io/dockur/windows
    profiles: [web-attack, full]
    hostname: web-win
    mem_limit: 4g
    cpus: 2
    devices:
      - /dev/kvm
    cap_add: [NET_ADMIN]
    networks:
      c2:
        ipv4_address: "172.16.0.42"
      dmz_internal:
        ipv4_address: "172.16.100.12"
      router_dmz:
        ipv4_address: "130.2.2.12"
    environment:
      VERSION: "2025"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "40G"
    volumes:
      - web-win-disk:/storage
      - ./config/web-win/unattend.xml:/unattend.xml:ro
      - ./config/web-win/setup.ps1:/oem/setup.ps1:ro
    restart: unless-stopped

  # ── DMZ Supporting Services ───────────────────────────────────────────────
  # dns-dmz runs Windows DNS standalone (not domain joined)
  dns-dmz:
    container_name: DNS-DMZ
    image: ghcr.io/dockur/windows
    profiles: [web-attack, full]
    hostname: dns-dmz
    mem_limit: 2g
    cpus: 1
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.44"
      dmz_internal:
        ipv4_address: "172.16.100.6"
      router_dmz:
        ipv4_address: "130.2.2.6"
    environment:
      VERSION: "2025"
      RAM_SIZE: "2G"
      CPU_CORES: "1"
      DISK_SIZE: "20G"
    volumes:
      - dns-dmz-disk:/storage
      - ./config/dns-dmz/unattend.xml:/unattend.xml:ro
      - ./config/dns-dmz/setup.ps1:/oem/setup.ps1:ro
    restart: unless-stopped

  mail-relay:
    container_name: MAIL-RELAY
    image: boky/postfix
    profiles: [web-attack, full]
    hostname: mail-relay
    mem_limit: 256m
    networks:
      c2:
        ipv4_address: "172.16.0.45"
      dmz_internal:
        ipv4_address: "172.16.100.8"
      router_dmz:
        ipv4_address: "130.2.2.20"
    environment:
      RELAYHOST: "192.168.200.10"          # exchange server IP
      ALLOWED_SENDER_DOMAINS: "secure.net"
      POSTFIX_myhostname: "mail.secure.net"
    restart: unless-stopped

  # ── Internal Servers — Domain Controllers & AD Services ──────────────────
  # dc01: Primary Domain Controller + AD CS (PKI)
  # All other internal servers depend on dc01's LDAP healthcheck.
  dc01:
    container_name: DC01
    image: ghcr.io/dockur/windows
    profiles: [core, web-attack, full]
    hostname: dc01
    mem_limit: 4g
    cpus: 2
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.70"
      server:
        ipv4_address: "192.168.200.1"
    environment:
      VERSION: "2025"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "60G"
    volumes:
      - dc01-disk:/storage
      - ./config/dc01/unattend.xml:/unattend.xml:ro
      - ./config/dc01/setup.ps1:/oem/setup.ps1:ro
    # Healthcheck polls LDAP port 389 on the Windows VM's server-network IP.
    # start_period gives Windows 25 min to install OS and promote to DC.
    # Other containers use condition: service_healthy to wait for AD to be ready.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo >/dev/tcp/192.168.200.1/389) 2>/dev/null'"]
      interval: 60s
      timeout: 10s
      retries: 40
      start_period: 25m
    restart: unless-stopped

  exchange:
    container_name: EXCHANGE
    image: ghcr.io/dockur/windows
    profiles: [web-attack, full]
    hostname: exchange
    mem_limit: 8g
    cpus: 4
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.72"
      server:
        ipv4_address: "192.168.200.10"
    environment:
      VERSION: "2025"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "80G"
    volumes:
      - exchange-disk:/storage
      - ./config/exchange/unattend.xml:/unattend.xml:ro
      - ./config/exchange/setup.ps1:/oem/setup.ps1:ro
    depends_on:
      dc01:
        condition: service_healthy
    restart: unless-stopped

  fileserver:
    container_name: FILESERVER
    image: ghcr.io/dockur/windows
    profiles: [full]
    hostname: fileserver
    mem_limit: 2g
    cpus: 1
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.74"
      server:
        ipv4_address: "192.168.200.6"
    environment:
      VERSION: "2025"
      RAM_SIZE: "2G"
      CPU_CORES: "1"
      DISK_SIZE: "40G"
    volumes:
      - fileserver-disk:/storage
      - ./config/fileserver/unattend.xml:/unattend.xml:ro
      - ./config/fileserver/setup.ps1:/oem/setup.ps1:ro
    depends_on:
      dc01:
        condition: service_healthy
    restart: unless-stopped

  # ── Database ──────────────────────────────────────────────────────────────
  # db01 runs MSSQL on Linux — domain-joined via realmd at startup
  db01:
    container_name: DB01
    build: ./dockerfiles/db01
    image: cyber-range/db01:local
    profiles: [web-attack, full]
    hostname: db01
    mem_limit: 4g
    cpus: 2
    networks:
      c2:
        ipv4_address: "172.16.0.30"
      db:
        ipv4_address: "192.168.214.10"
    environment:
      RANGE_PASSWORD: ${RANGE_PASSWORD}
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      AD_DOMAIN: ${AD_DOMAIN}
      AD_NETBIOS: ${AD_NETBIOS}
      AD_ADMIN_PASSWORD: ${AD_ADMIN_PASSWORD}
      WAZUH_MANAGER: ${WAZUH_MANAGER}
      WAZUH_ENROLLMENT_PSK: ${WAZUH_ENROLLMENT_PSK}
      WAZUH_AGENT_NAME: db01
    depends_on:
      dc01:
        condition: service_healthy
    restart: unless-stopped

  # ── User Workstations ─────────────────────────────────────────────────────
  wks-linux:
    container_name: WKS-LINUX
    build: ./dockerfiles/wks-linux
    image: cyber-range/wks-linux:local
    profiles: [full]
    hostname: wks-linux
    mem_limit: 1g
    cpus: 1
    networks:
      c2:
        ipv4_address: "172.16.0.100"
      user:
        ipv4_address: "192.168.100.10"
    environment:
      - WAZUH_MANAGER=${WAZUH_MANAGER}
      - WAZUH_ENROLLMENT_PSK=${WAZUH_ENROLLMENT_PSK}
      - WAZUH_AGENT_NAME=wks-linux
    restart: unless-stopped

  wks-win10:
    container_name: WKS-WIN10
    image: ghcr.io/dockur/windows
    profiles: [core, web-attack, full]
    hostname: wks-win10
    mem_limit: 4g
    cpus: 2
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.101"
      user:
        ipv4_address: "192.168.100.11"
    environment:
      VERSION: "win10"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "40G"
    volumes:
      - wks-win10-disk:/storage
      - ./config/wks-win10/unattend.xml:/unattend.xml:ro
      - ./config/wks-win10/setup.ps1:/oem/setup.ps1:ro
    depends_on:
      dc01:
        condition: service_healthy
    restart: unless-stopped

  wks-win11:
    container_name: WKS-WIN11
    image: ghcr.io/dockur/windows
    profiles: [full]
    hostname: wks-win11
    mem_limit: 4g
    cpus: 2
    devices:
      - /dev/kvm
    networks:
      c2:
        ipv4_address: "172.16.0.102"
      user:
        ipv4_address: "192.168.100.12"
    environment:
      VERSION: "win11"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "40G"
    volumes:
      - wks-win11-disk:/storage
      - ./config/wks-win11/unattend.xml:/unattend.xml:ro
      - ./config/wks-win11/setup.ps1:/oem/setup.ps1:ro
    depends_on:
      dc01:
        condition: service_healthy
    restart: unless-stopped

  wks-macos:
    container_name: WKS-MACOS
    image: dockurr/macos
    profiles: [full]
    hostname: wks-macos
    mem_limit: 4g
    cpus: 2
    stop_grace_period: 2m
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      c2:
        ipv4_address: "172.16.0.103"
      user:
        ipv4_address: "192.168.100.13"
    environment:
      # macOS 14 Sonoma — intentionally unpatched for CVE scenarios
      VERSION: "14"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "64G"
    volumes:
      - wks-macos-disk:/storage
    # SSH (Remote Login): enable manually after first boot via:
    #   System Settings → General → Sharing → Remote Login → ON
    # Or run in Terminal: sudo systemsetup -setremotelogin on
    restart: unless-stopped

  # ── SIEM — Wazuh ─────────────────────────────────────────────────────────
  # Three-container Wazuh single-node stack: manager + indexer + dashboard.
  # Run 'make build' before 'make up' to generate required TLS certificates.

  wazuh.manager:
    container_name: WAZUH-MANAGER
    image: wazuh/wazuh-manager:${WAZUH_VERSION}
    profiles: [core, web-attack, full]
    hostname: wazuh.manager
    mem_limit: 2g
    cpus: 2
    networks:
      siem:
        ipv4_address: "192.168.66.50"
      # Also on C2 so all Linux agents can reach it without routing through fw-core
      c2:
        ipv4_address: "172.16.0.5"
    environment:
      INDEXER_URL: "https://wazuh.indexer:9200"
      INDEXER_USERNAME: "admin"
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      FILEBEAT_SSL_VERIFICATION_MODE: "full"
      SSL_CERTIFICATE_AUTHORITIES: "/etc/ssl/root-ca.pem"
      SSL_CERTIFICATE: "/etc/ssl/wazuh.manager.pem"
      SSL_KEY: "/etc/ssl/wazuh.manager-key.pem"
      API_USERNAME: "wazuh-wui"
      API_PASSWORD: ${WAZUH_API_PASSWORD}
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - ./config/wazuh/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./config/wazuh/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh/certs/wazuh.manager.pem:/etc/ssl/wazuh.manager.pem:ro
      - ./config/wazuh/certs/wazuh.manager-key.pem:/etc/ssl/wazuh.manager-key.pem:ro
    ports:
      - "1514:1514"     # Agent event forwarding
      - "1515:1515"     # Agent enrollment
      - "55000:55000"   # Wazuh REST API
    restart: unless-stopped

  wazuh.indexer:
    container_name: WAZUH-INDEXER
    image: wazuh/wazuh-indexer:${WAZUH_VERSION}
    profiles: [core, web-attack, full]
    hostname: wazuh.indexer
    mem_limit: 2g
    cpus: 2
    networks:
      siem:
        ipv4_address: "192.168.66.20"
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./config/wazuh/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./config/wazuh/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem:ro
      - ./config/wazuh/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer-key.pem:ro
      - ./config/wazuh/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./config/wazuh/certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
    restart: unless-stopped

  wazuh.dashboard:
    container_name: WAZUH-DASHBOARD
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION}
    profiles: [core, web-attack, full]
    hostname: wazuh.dashboard
    mem_limit: 1g
    networks:
      siem:
        ipv4_address: "192.168.66.10"
    environment:
      INDEXER_USERNAME: "admin"
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      WAZUH_API_URL: "https://wazuh.manager"
      DASHBOARD_USERNAME: "kibanaserver"
      DASHBOARD_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      API_USERNAME: "wazuh-wui"
      API_PASSWORD: ${WAZUH_API_PASSWORD}
    volumes:
      - ./config/wazuh/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/wazuh/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./config/wazuh/certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./config/wazuh/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
    ports:
      - "443:5601"    # Wazuh dashboard — HTTPS access from host
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    restart: unless-stopped

  # ── SOC Workstation ───────────────────────────────────────────────────────
  # Standalone (not domain joined) — out-of-band analyst machine.
  # Access via noVNC on :8006, then configure RDP client inside Windows.
  soc-ws:
    container_name: SOC-WS
    image: ghcr.io/dockur/windows
    profiles: [core, web-attack, full]
    hostname: soc-ws
    mem_limit: 4g
    cpus: 2
    devices:
      - /dev/kvm
    networks:
      management:
        ipv4_address: "172.31.202.11"
      c2:
        ipv4_address: "172.16.0.80"
      soc_net:
        ipv4_address: "192.168.110.11"
    environment:
      VERSION: "win10"
      RAM_SIZE: "4G"
      CPU_CORES: "2"
      DISK_SIZE: "40G"
    volumes:
      - soc-ws-disk:/storage
      - ./config/soc-ws/unattend.xml:/unattend.xml:ro
      - ./config/soc-ws/setup.ps1:/oem/setup.ps1:ro
    ports:
      - "8006:8006"   # noVNC — initial console access before RDP is configured
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes — persistent disk images for Windows and macOS VMs
# ---------------------------------------------------------------------------
volumes:
  # Windows VM disk images (preserved on 'make down', destroyed on 'make reset')
  web-win-disk:
  dns-dmz-disk:
  dc01-disk:
  exchange-disk:
  fileserver-disk:
  wks-win10-disk:
  wks-win11-disk:
  wks-macos-disk:
  soc-ws-disk:

  # Wazuh persistent data
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-queue:
  wazuh-indexer-data:
